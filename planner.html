<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song ↔ Exercise Sequence Planner</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d26;
    --bg3: #22263a;
    --border: #2e3348;
    --accent: #4f8ef7;
    --text: #e4e6f0;
    --text2: #8a8fa8;
    --text3: #5a5f78;
    --success: #3dba7a;
    --warn: #f5a623;
    --danger: #e05252;
    --mix-color: #f5a623;
    --radius: 8px;
    --panel-w: 290px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; }
  #topbar h1 span { color: var(--accent); }
  .topbar-stats { display: flex; gap: 24px; margin-left: auto; align-items: center; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }

  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity .15s, transform .1s; white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.success { background: var(--success); color: #fff; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn.xs { padding: 2px 7px; font-size: 11px; }
  .btn.icon { padding: 4px 8px; font-size: 13px; background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .btn.icon:hover { color: var(--text); border-color: var(--text3); }

  /* ── LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── LEFT PANEL ── */
  #left-panel {
    width: var(--panel-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-tab {
    flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 600; text-align: center;
    cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .panel-section { display: none; flex-direction: column; gap: 8px; }
  .panel-section.active { display: flex; }

  /* ── LIBRARY ITEMS ── */
  .lib-item {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 10px; display: flex; align-items: flex-start; gap: 8px;
    cursor: grab; user-select: none; transition: border-color .15s, box-shadow .15s;
  }
  .lib-item:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .lib-item.dragging { opacity: .4; }
  .posture-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
  .lib-item-info { flex: 1; min-width: 0; }
  .lib-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-item-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .lib-item-vars { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .var-chip {
    font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    background: #ffffff15; color: var(--text2);
  }
  .lib-item-actions { display: flex; gap: 3px; flex-shrink: 0; }

  /* ── CENTER ── */
  #center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #sequence-area {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 0;
  }
  .sequence-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--text3); gap: 12px; pointer-events: none;
  }
  .sequence-empty .big-icon { font-size: 48px; opacity: .3; }

  /* ── SONG CARD ── */
  .song-wrapper { display: flex; flex-direction: column; position: relative; }
  .song-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    display: flex; flex-direction: column; transition: border-color .15s, box-shadow .15s;
    position: relative; z-index: 1;
  }
  .song-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px #4f8ef740; }
  .song-card.posture-drag-over { border-color: var(--success); box-shadow: 0 0 0 2px #3dba7a40; }
  .song-card.overflow { border-color: var(--danger); }

  .song-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: grab;
  }
  .song-handle { color: var(--text3); font-size: 16px; cursor: grab; }
  .song-num {
    width: 22px; height: 22px; border-radius: 50%; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text2); flex-shrink: 0;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-artist { font-size: 11px; color: var(--text2); }
  .song-duration {
    font-size: 13px; font-weight: 700; color: var(--accent);
    background: var(--bg3); border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
  }
  .song-duration.mix-adjusted { color: var(--mix-color); }

  /* ── MIX CONTROLS ── */
  .song-controls {
    display: flex; align-items: center; gap: 6px; padding: 0 12px 8px; flex-wrap: wrap;
  }
  .mix-toggle {
    display: flex; align-items: center; gap: 6px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px;
    cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text3);
    transition: all .15s; user-select: none;
  }
  .mix-toggle.active { background: #f5a62322; border-color: var(--mix-color); color: var(--mix-color); }
  .mix-incoming {
    font-size: 11px; color: var(--mix-color); background: #f5a62315;
    border: 1px solid #f5a62340; border-radius: 20px; padding: 3px 10px;
  }
  .mix-amount-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .mix-amount-wrap input {
    width: 68px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; padding: 3px 7px; text-align: center;
  }
  .mix-amount-wrap input:focus { outline: none; border-color: var(--mix-color); }

  /* ── POSTURES ON SONG ── */
  .song-postures-area { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 6px; min-height: 36px; }
  .posture-drop-zone {
    border: 1.5px dashed var(--border); border-radius: 6px; padding: 8px 10px;
    font-size: 11px; color: var(--text3); text-align: center;
    transition: border-color .15s, background .15s;
  }
  .posture-drop-zone.hover { border-color: var(--success); background: #3dba7a10; color: var(--success); }

  /* ── POSTURE ROW ON SONG ── */
  .posture-row {
    background: var(--bg3); border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .posture-row-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  }
  .posture-color-swatch {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .posture-row-name { font-size: 12px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .posture-row-dur { font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
  .posture-row-actions { display: flex; gap: 3px; }

  /* ── VARIATION BAR ── */
  .variation-bar {
    display: flex; height: 20px; overflow: hidden; border-radius: 0 0 5px 5px;
  }
  .var-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff; overflow: hidden;
    text-shadow: 0 1px 2px #0008; transition: flex .2s;
    min-width: 0;
  }
  .var-seg.free {
    background: repeating-linear-gradient(
      45deg, transparent, transparent 3px, #ffffff0a 3px, #ffffff0a 6px
    );
    color: var(--text3);
  }
  .var-seg-label { white-space: nowrap; overflow: hidden; padding: 0 4px; }

  /* ── OVERFLOW WARNING ── */
  .overflow-warning {
    margin: 0 12px 10px;
    background: #e0525218; border: 1px solid #e0525260; border-radius: 6px;
    padding: 8px 12px; display: flex; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .overflow-warning-icon { font-size: 16px; flex-shrink: 0; }
  .overflow-warning-text { flex: 1; line-height: 1.4; }
  .overflow-warning-text strong { color: var(--danger); }

  /* ── MIX CONNECTOR ── */
  .mix-connector { display: none; position: relative; margin: 0 12px; z-index: 2; }
  .mix-connector.visible { display: block; }
  .mix-connector-inner {
    background: linear-gradient(135deg, #f5a62333, #f5a62355);
    border-left: 2px solid var(--mix-color); border-right: 2px solid var(--mix-color);
    border-radius: 0 0 8px 8px; padding: 4px 12px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--mix-color); font-weight: 600;
  }
  .mix-overlap-bar { position: relative; height: 5px; background: var(--border); border-radius: 3px; margin: 3px 0; overflow: hidden; }
  .mix-overlap-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--mix-color); border-radius: 3px; }

  .song-gap { height: 8px; }
  .song-gap.has-mix { height: 0; }

  /* ── ADD SONG BAR ── */
  #add-song-bar {
    border-top: 1px solid var(--border); padding: 10px 16px;
    display: flex; gap: 8px; background: var(--bg2); flex-shrink: 0;
  }

  /* ── TIMELINE ── */
  #timeline-panel {
    border-top: 1px solid var(--border); background: var(--bg2);
    flex-shrink: 0; padding: 10px 16px 12px;
  }
  .timeline-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: .8px;
  }
  .timeline-track { height: 36px; background: var(--bg3); border-radius: 8px; overflow: hidden; display: flex; }
  .timeline-seg {
    height: 100%; position: relative; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; overflow: hidden; text-shadow: 0 1px 2px #0006;
    cursor: default;
  }
  .timeline-seg:not(:last-child)::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0;
    width: 1px; background: #ffffff22;
  }
  .timeline-mix-overlay {
    position: absolute; top: 0; bottom: 0; right: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 3px, #ffffff22 3px, #ffffff22 6px);
    pointer-events: none;
  }
  .timeline-labels { position: relative; height: 14px; margin-top: 4px; font-size: 10px; color: var(--text3); }
  .timeline-label { position: absolute; transform: translateX(-50%); white-space: nowrap; }
  .timeline-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ── MODALS ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: #000a; z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 420px; max-width: calc(100vw - 32px); max-height: calc(100vh - 40px);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    box-shadow: 0 20px 60px #000c;
  }
  .modal.wide { width: 520px; }
  .modal h2 { font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .modal-body { display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .field input, .field select {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 14px; padding: 8px 12px; width: 100%;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

  /* ── COLOR PICKER ── */
  .color-options { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-opt {
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; transition: border-color .1s, transform .1s;
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { border-color: #fff; }

  /* ── VARIATION EDITOR (in posture modal) ── */
  .var-editor-row {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px;
  }
  .var-editor-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .var-editor-name {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 13px; font-weight: 600; min-width: 0;
  }
  .var-editor-name:focus { outline: none; }
  .var-editor-dur {
    width: 62px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-size: 12px; padding: 3px 6px;
    text-align: center;
  }
  .var-editor-dur:focus { outline: none; border-color: var(--accent); }

  /* ── VARIATION TOTAL BAR ── */
  .var-total-bar-wrap { margin-top: 4px; }
  .var-total-bar {
    height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; position: relative;
  }
  .var-total-fill { height: 100%; border-radius: 3px; transition: width .2s; }
  .var-total-label {
    font-size: 11px; color: var(--text2); margin-top: 4px; display: flex; justify-content: space-between;
  }
  .var-total-label.over { color: var(--danger); }

  /* ── QUICK-ADD BUTTONS ── */
  .quick-add-row { display: flex; gap: 4px; flex-wrap: wrap; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SONG SEARCH ── */
  .song-search-results {
    max-height: 180px; overflow-y: auto; border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; flex-direction: column; background: var(--bg3);
  }
  .song-search-result {
    padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); font-size: 13px; transition: background .1s;
  }
  .song-search-result:last-child { border-bottom: none; }
  .song-search-result:hover { background: var(--bg2); }
  .ssr-title { font-weight: 600; }
  .ssr-sub { font-size: 11px; color: var(--text2); }
  .ssr-dur { font-size: 12px; color: var(--accent); margin-left: auto; }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 8px; color: var(--text3); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>Song <span>↔</span> Exercise Planner</h1>
  <div class="topbar-stats">
    <div class="stat">
      <span class="stat-label">Songs</span>
      <span class="stat-value" id="stat-songs">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Time</span>
      <span class="stat-value" id="stat-time">0:00</span>
    </div>
    <div class="stat">
      <span class="stat-label">Effective Time</span>
      <span class="stat-value" id="stat-eff">0:00</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="postures">Postures</div>
      <div class="panel-tab" data-tab="songs">Song History</div>
    </div>
    <div class="panel-body">
      <div class="panel-section active" id="section-postures">
        <button class="btn sm" onclick="openPostureModal()">+ New Posture</button>
        <div id="postures-list"></div>
      </div>
      <div class="panel-section" id="section-songs">
        <button class="btn sm" onclick="openSongModal()">+ Add Song</button>
        <div id="songs-list"></div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="sequence-area" ondragover="onSequenceAreaDragOver(event)" ondrop="onSequenceAreaDrop(event)">
      <div class="sequence-empty" id="seq-empty">
        <div class="big-icon">🎵</div>
        <div>Drag songs from history, or click<br>"+ Add Song to Plan" below.</div>
      </div>
    </div>

    <div id="add-song-bar">
      <button class="btn secondary" style="flex:1" onclick="openAddToSequenceModal()">+ Add Song to Plan</button>
      <button class="btn icon" title="Clear plan" onclick="clearSequence()">🗑</button>
    </div>

    <div id="timeline-panel">
      <div class="timeline-header">
        Timeline
        <span id="timeline-total" style="font-weight:400;color:var(--text2);font-size:11px;text-transform:none;letter-spacing:0"></span>
      </div>
      <div class="timeline-track" id="timeline-track"></div>
      <div class="timeline-labels" id="timeline-labels"></div>
      <div class="timeline-legend" id="timeline-legend"></div>
    </div>
  </div>
</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- POSTURE MODAL -->
<div class="modal-overlay" id="posture-modal">
  <div class="modal wide">
    <h2 id="pm-title">New Posture</h2>
    <div class="modal-body">
      <div style="display:flex;gap:12px">
        <div class="field" style="flex:2">
          <label>Posture Name</label>
          <input id="pm-name" type="text" placeholder="e.g. Warrior II">
        </div>
        <div class="field" style="flex:1">
          <label>Total Duration</label>
          <input id="pm-dur" type="text" placeholder="3:00" oninput="updateVarBar()">
        </div>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-options" id="pm-colors"></div>
      </div>

      <!-- VARIATIONS -->
      <div class="field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label style="margin:0">Variations</label>
          <div class="quick-add-row">
            <button class="btn secondary xs" onclick="addVariationRow('Hold')">+ Hold</button>
            <button class="btn secondary xs" onclick="addVariationRow('Pulse')">+ Pulse</button>
            <button class="btn secondary xs" onclick="addVariationRow('Large ROM')">+ Large ROM</button>
            <button class="btn secondary xs" onclick="addVariationRow('')">+ Custom</button>
          </div>
        </div>
        <div id="pm-vars" style="display:flex;flex-direction:column;gap:4px;min-height:32px">
          <div id="pm-vars-empty" style="font-size:11px;color:var(--text3);text-align:center;padding:10px">
            No variations — add using the buttons above
          </div>
        </div>
        <div class="var-total-bar-wrap">
          <div class="var-total-bar"><div class="var-total-fill" id="pm-var-fill" style="width:0%;background:var(--success)"></div></div>
          <div class="var-total-label" id="pm-var-label">0:00 used of 0:00</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closePostureModal()">Cancel</button>
      <button class="btn" onclick="savePosture()">Save Posture</button>
    </div>
  </div>
</div>

<!-- SONG MODAL -->
<div class="modal-overlay" id="song-modal">
  <div class="modal">
    <h2 id="song-modal-title">Add Song to History</h2>
    <div class="modal-body">
      <div class="field"><label>Song Title</label><input id="sm-title" type="text" placeholder="e.g. Higher Ground"></div>
      <div class="field"><label>Artist</label><input id="sm-artist" type="text" placeholder="e.g. Solar Fields"></div>
      <div class="field"><label>Duration (mm:ss)</label><input id="sm-dur" type="text" placeholder="e.g. 3:45"></div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeSongModal()">Cancel</button>
      <button class="btn" onclick="saveSong()">Save Song</button>
    </div>
  </div>
</div>

<!-- ADD TO SEQUENCE MODAL -->
<div class="modal-overlay" id="seq-modal">
  <div class="modal">
    <h2>Add Song to Plan</h2>
    <div class="modal-body">
      <div class="field">
        <label>Search history</label>
        <input id="seqm-search" type="text" placeholder="Type to search…" oninput="seqSearchFilter()">
      </div>
      <div class="song-search-results" id="seqm-results"></div>
      <div class="divider">or add new</div>
      <div class="field"><label>Title</label><input id="seqm-title" type="text" placeholder="Song title"></div>
      <div class="field"><label>Artist</label><input id="seqm-artist" type="text" placeholder="Artist"></div>
      <div class="field"><label>Duration (mm:ss)</label><input id="seqm-dur" type="text" placeholder="e.g. 3:45"></div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeSeqModal()">Cancel</button>
      <button class="btn" onclick="addSongToSequence()">Add to Plan</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────
const COLORS = [
  '#4f8ef7','#3dba7a','#e05252','#f5a623','#9c59d1',
  '#26c6da','#ff7043','#66bb6a','#ab47bc','#ef5350',
  '#29b6f6','#ffca28','#8d6e63','#78909c','#ec407a'
];

// Lighten a hex color by mixing with white (factor 0=original, 1=white)
function lightenHex(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r+(255-r)*factor)},${Math.round(g+(255-g)*factor)},${Math.round(b+(255-b)*factor)})`;
}
// Generate distinct variation colors from a base color
function varColor(baseHex, idx) {
  const factors = [0, 0.30, 0.55, 0.72, 0.85];
  return lightenHex(baseHex, factors[idx % factors.length]);
}

// ── STATE ──────────────────────────────────────────────────────────
let state = {
  postures: [],     // {id, name, duration(s), color, variations:[{id,name,duration(s)}]}
  songHistory: [],  // {id, title, artist, duration(s)}
  sequence: [],     // {id, songId, title, artist, duration(s), mix:{enabled,amount(s)}, postures:[{id,postureId,notes}]}
};

// ── MODAL EDIT STATE ───────────────────────────────────────────────
let editingPostureId = null;
let editingSongId = null;
let pmVariations = [];      // working copy while posture modal is open: [{id,name,duration}]
let pmSelectedColor = COLORS[0];

// ── PERSISTENCE ────────────────────────────────────────────────────
function save() {
  localStorage.setItem('planner_v2', JSON.stringify(state));
}
function load() {
  try {
    const raw = localStorage.getItem('planner_v2');
    if (raw) {
      state = JSON.parse(raw);
    } else {
      // Migrate from v1 if present
      const v1 = localStorage.getItem('planner_state');
      if (v1) {
        const old = JSON.parse(v1);
        state.postures = (old.blocks || []).map(b => ({
          id: b.id, name: b.name, duration: b.duration, color: b.color, variations: []
        }));
        state.songHistory = old.songHistory || [];
        state.sequence = (old.sequence || []).map(s => ({
          id: s.id, songId: s.songId, title: s.title, artist: s.artist, duration: s.duration,
          mix: s.mix || {enabled:false,amount:0},
          postures: (s.blocks || []).map(b => ({id: b.id, postureId: b.blockId, notes: b.notes||''}))
        }));
      }
    }
  } catch(e) {}
  if (!state.postures) state.postures = [];
  if (!state.songHistory) state.songHistory = [];
  if (!state.sequence) state.sequence = [];
  state.sequence.forEach(s => { if (!s.postures) s.postures = []; });
}

// ── HELPERS ────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function parseTime(str) {
  if (!str) return null;
  str = String(str).trim();
  const p = str.split(':');
  if (p.length === 2) return (parseInt(p[0],10)||0)*60 + (parseInt(p[1],10)||0);
  const n = parseFloat(str);
  return isNaN(n) ? null : Math.round(n);
}
function fmtTime(secs) {
  if (secs == null || isNaN(secs)) return '--';
  secs = Math.round(secs);
  return `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
}
function getPosture(id) { return state.postures.find(p => p.id === id); }
function getSongHist(id) { return state.songHistory.find(s => s.id === id); }
function getSeqItem(id) { return state.sequence.find(s => s.id === id); }

function postureVariationsTotal(posture) {
  return (posture.variations||[]).reduce((s,v)=>s+(v.duration||0), 0);
}
function seqItemPostureTotal(seqItem) {
  return (seqItem.postures||[]).reduce((s,entry)=>{
    const p = getPosture(entry.postureId);
    return s + (p ? p.duration : 0);
  }, 0);
}
function calcEffectiveTime() {
  let total = 0, mixSaved = 0;
  state.sequence.forEach((item, i) => {
    total += item.duration || 0;
    if (item.mix?.enabled && item.mix.amount > 0 && i < state.sequence.length - 1)
      mixSaved += item.mix.amount / 2;
  });
  return { total, effective: total - mixSaved, mixSaved };
}

// ── ESCAPE HTML ────────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ──────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── PANEL TABS ─────────────────────────────────────────────────────
document.querySelectorAll('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('section-' + tab.dataset.tab).classList.add('active');
  });
});

// ══════════════════════════════════════════════════════════════════
//  POSTURE MODAL
// ══════════════════════════════════════════════════════════════════
function openPostureModal(editId) {
  editingPostureId = editId || null;
  document.getElementById('pm-title').textContent = editId ? 'Edit Posture' : 'New Posture';

  if (editId) {
    const p = getPosture(editId);
    document.getElementById('pm-name').value = p.name;
    document.getElementById('pm-dur').value = fmtTime(p.duration);
    pmSelectedColor = p.color;
    pmVariations = (p.variations||[]).map(v => ({...v}));
  } else {
    document.getElementById('pm-name').value = '';
    document.getElementById('pm-dur').value = '';
    pmSelectedColor = COLORS[state.postures.length % COLORS.length];
    pmVariations = [];
  }

  renderColorPicker('pm-colors', pmSelectedColor, c => { pmSelectedColor = c; renderColorPicker('pm-colors', pmSelectedColor, null); renderVarRows(); });
  renderVarRows();
  updateVarBar();
  document.getElementById('posture-modal').classList.add('open');
  document.getElementById('pm-name').focus();
}
function closePostureModal() {
  document.getElementById('posture-modal').classList.remove('open');
}

function addVariationRow(name) {
  pmVariations.push({ id: uid(), name, duration: 0 });
  renderVarRows();
  updateVarBar();
}

function removeVariationRow(vid) {
  pmVariations = pmVariations.filter(v => v.id !== vid);
  renderVarRows();
  updateVarBar();
}

function renderVarRows() {
  const container = document.getElementById('pm-vars');
  const emptyEl = document.getElementById('pm-vars-empty');

  // Remove old rows (keep empty message)
  Array.from(container.children).forEach(c => { if (c !== emptyEl) c.remove(); });

  if (pmVariations.length === 0) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  pmVariations.forEach((v, idx) => {
    const row = document.createElement('div');
    row.className = 'var-editor-row';
    const color = varColor(pmSelectedColor, idx);
    row.innerHTML = `
      <div class="var-editor-swatch" style="background:${color}"></div>
      <input class="var-editor-name" type="text" value="${esc(v.name)}" placeholder="Name"
             oninput="pmVariations[${idx}].name=this.value">
      <input class="var-editor-dur" type="text" value="${v.duration>0?fmtTime(v.duration):''}" placeholder="0:30"
             oninput="pmVariations[${idx}].duration=parseTime(this.value)||0;updateVarBar()">
      <button class="btn icon xs" onclick="removeVariationRow('${v.id}')">✕</button>
    `;
    container.appendChild(row);
  });
}

function updateVarBar() {
  const totalStr = document.getElementById('pm-dur').value;
  const totalSecs = parseTime(totalStr) || 0;
  const usedSecs = pmVariations.reduce((s,v)=>s+(v.duration||0),0);
  const pct = totalSecs > 0 ? Math.min(100, (usedSecs/totalSecs)*100) : 0;
  const over = usedSecs > totalSecs && totalSecs > 0;

  const fill = document.getElementById('pm-var-fill');
  const label = document.getElementById('pm-var-label');
  fill.style.width = pct + '%';
  fill.style.background = over ? 'var(--danger)' : usedSecs === totalSecs && totalSecs > 0 ? 'var(--success)' : 'var(--accent)';
  const freeStr = totalSecs > 0 ? fmtTime(Math.max(0, totalSecs - usedSecs)) + ' free' : '';
  label.textContent = `${fmtTime(usedSecs)} used of ${fmtTime(totalSecs)}${freeStr ? '  ·  ' + freeStr : ''}`;
  label.className = 'var-total-label' + (over ? ' over' : '');
}

function savePosture() {
  const name = document.getElementById('pm-name').value.trim();
  const durStr = document.getElementById('pm-dur').value.trim();
  if (!name) { toast('Posture name required'); return; }
  const dur = parseTime(durStr);
  if (dur === null || dur <= 0) { toast('Enter a valid duration (m:ss)'); return; }

  const varTotal = pmVariations.reduce((s,v)=>s+(v.duration||0),0);
  if (varTotal > dur) {
    toast(`Variations total (${fmtTime(varTotal)}) exceeds posture duration (${fmtTime(dur)})`);
    return;
  }

  const cleanVars = pmVariations
    .filter(v => v.name.trim())
    .map(v => ({ id: v.id, name: v.name.trim(), duration: v.duration||0 }));

  if (editingPostureId) {
    const p = getPosture(editingPostureId);
    p.name = name; p.duration = dur; p.color = pmSelectedColor; p.variations = cleanVars;
  } else {
    state.postures.push({ id: uid(), name, duration: dur, color: pmSelectedColor, variations: cleanVars });
  }

  save(); renderPostures(); closePostureModal(); toast('Posture saved');
}

function deletePosture(id) {
  if (!confirm('Delete this posture? It will be removed from all songs.')) return;
  state.postures = state.postures.filter(p => p.id !== id);
  state.sequence.forEach(s => { s.postures = s.postures.filter(e => e.postureId !== id); });
  save(); renderPostures(); renderSequence();
}

// ── COLOR PICKER ───────────────────────────────────────────────────
function renderColorPicker(containerId, selected, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML = COLORS.map(c => `
    <div class="color-opt ${c===selected?'selected':''}" style="background:${c}"
         onclick="(${onSelect ? onSelect.toString() : 'function(){}'})(this.__color||'${c}');this.parentNode.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));this.classList.add('selected')"></div>
  `).join('');
  // Simpler approach: use data attribute
  container.querySelectorAll('.color-opt').forEach((el, i) => {
    el.onclick = () => {
      container.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      if (onSelect) onSelect(COLORS[i]);
    };
  });
}

// ══════════════════════════════════════════════════════════════════
//  SONG HISTORY MODAL
// ══════════════════════════════════════════════════════════════════
function openSongModal(editId) {
  editingSongId = editId || null;
  document.getElementById('song-modal-title').textContent = editId ? 'Edit Song' : 'Add Song to History';
  if (editId) {
    const s = getSongHist(editId);
    document.getElementById('sm-title').value = s.title;
    document.getElementById('sm-artist').value = s.artist;
    document.getElementById('sm-dur').value = fmtTime(s.duration);
  } else {
    document.getElementById('sm-title').value = '';
    document.getElementById('sm-artist').value = '';
    document.getElementById('sm-dur').value = '';
  }
  document.getElementById('song-modal').classList.add('open');
  document.getElementById('sm-title').focus();
}
function closeSongModal() { document.getElementById('song-modal').classList.remove('open'); }
function saveSong() {
  const title = document.getElementById('sm-title').value.trim();
  const artist = document.getElementById('sm-artist').value.trim();
  const dur = parseTime(document.getElementById('sm-dur').value);
  if (!title) { toast('Song title required'); return; }
  if (!dur) { toast('Enter a valid duration'); return; }
  if (editingSongId) {
    const s = getSongHist(editingSongId);
    s.title = title; s.artist = artist; s.duration = dur;
  } else {
    state.songHistory.push({ id: uid(), title, artist, duration: dur });
  }
  save(); renderSongHistory(); closeSongModal(); toast('Song saved');
}
function deleteSongHist(id) {
  if (!confirm('Remove from history?')) return;
  state.songHistory = state.songHistory.filter(s => s.id !== id);
  save(); renderSongHistory();
}

// ══════════════════════════════════════════════════════════════════
//  ADD SONG TO SEQUENCE MODAL
// ══════════════════════════════════════════════════════════════════
function openAddToSequenceModal() {
  ['seqm-search','seqm-title','seqm-artist','seqm-dur'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('seq-modal').classList.add('open');
  seqSearchFilter();
  document.getElementById('seqm-search').focus();
}
function closeSeqModal() { document.getElementById('seq-modal').classList.remove('open'); }
function seqSearchFilter() {
  const q = document.getElementById('seqm-search').value.toLowerCase();
  const results = document.getElementById('seqm-results');
  const hits = state.songHistory.filter(s =>
    s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
  );
  if (!hits.length) {
    results.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text3);font-size:12px">No matching songs</div>';
    return;
  }
  results.innerHTML = hits.map(s => `
    <div class="song-search-result" onclick="pickHistorySong('${s.id}')">
      <div><div class="ssr-title">${esc(s.title)}</div><div class="ssr-sub">${esc(s.artist)}</div></div>
      <div class="ssr-dur">${fmtTime(s.duration)}</div>
    </div>
  `).join('');
}
function pickHistorySong(histId) {
  const s = getSongHist(histId);
  addSeqItem(s.title, s.artist, s.duration, histId);
  closeSeqModal();
}
function addSongToSequence() {
  const title = document.getElementById('seqm-title').value.trim();
  const artist = document.getElementById('seqm-artist').value.trim();
  const dur = parseTime(document.getElementById('seqm-dur').value);
  if (!title) { toast('Song title required'); return; }
  if (!dur) { toast('Enter a valid duration'); return; }
  let histId;
  const existing = state.songHistory.find(s =>
    s.title.toLowerCase()===title.toLowerCase() && s.artist.toLowerCase()===artist.toLowerCase()
  );
  if (existing) {
    histId = existing.id;
  } else {
    const ns = { id: uid(), title, artist, duration: dur };
    state.songHistory.push(ns); histId = ns.id;
  }
  addSeqItem(title, artist, dur, histId);
  save(); renderSongHistory(); closeSeqModal();
}
function addSeqItem(title, artist, duration, songId) {
  state.sequence.push({ id: uid(), songId, title, artist, duration,
    mix: {enabled:false,amount:0}, postures: [] });
  save(); renderSequence(); toast(`"${title}" added to plan`);
}
function addNextSong() {
  closeSeqModal && null;
  openAddToSequenceModal();
}

// ══════════════════════════════════════════════════════════════════
//  RENDER POSTURES LIBRARY
// ══════════════════════════════════════════════════════════════════
function renderPostures() {
  const list = document.getElementById('postures-list');
  if (!state.postures.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No postures yet</div>';
    return;
  }
  list.innerHTML = state.postures.map(p => {
    const varChips = (p.variations||[]).map((v,i) =>
      `<span class="var-chip" style="background:${varColor(p.color,i)}22;color:${varColor(p.color,i)}">${esc(v.name)}</span>`
    ).join('');
    return `
      <div class="lib-item" draggable="true"
           ondragstart="onPostureDragStart(event,'${p.id}')"
           ondragend="onPostureDragEnd(event)">
        <div class="posture-dot" style="background:${p.color}"></div>
        <div class="lib-item-info">
          <div class="lib-item-name">${esc(p.name)}</div>
          <div class="lib-item-sub">${fmtTime(p.duration)}${p.variations?.length ? ` · ${p.variations.length} var.` : ''}</div>
          ${varChips ? `<div class="lib-item-vars">${varChips}</div>` : ''}
        </div>
        <div class="lib-item-actions">
          <button class="btn icon sm" title="Edit" onclick="openPostureModal('${p.id}')">✏️</button>
          <button class="btn icon sm" title="Delete" onclick="deletePosture('${p.id}')">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════
//  RENDER SONG HISTORY
// ══════════════════════════════════════════════════════════════════
function renderSongHistory() {
  const list = document.getElementById('songs-list');
  if (!state.songHistory.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No songs yet</div>';
    return;
  }
  list.innerHTML = state.songHistory.map(s => `
    <div class="lib-item" draggable="true"
         ondragstart="onSongHistDragStart(event,'${s.id}')"
         ondragend="onSongHistDragEnd(event)">
      <div style="font-size:16px;flex-shrink:0">🎵</div>
      <div class="lib-item-info">
        <div class="lib-item-name">${esc(s.title)}</div>
        <div class="lib-item-sub">${esc(s.artist)} · ${fmtTime(s.duration)}</div>
      </div>
      <div class="lib-item-actions">
        <button class="btn icon sm" onclick="openSongModal('${s.id}')">✏️</button>
        <button class="btn icon sm" onclick="deleteSongHist('${s.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════════════
//  RENDER SEQUENCE
// ══════════════════════════════════════════════════════════════════
function renderSequence() {
  const area = document.getElementById('sequence-area');
  const empty = document.getElementById('seq-empty');

  Array.from(area.querySelectorAll('.song-wrapper,.song-gap')).forEach(e => e.remove());

  if (!state.sequence.length) {
    empty.style.display = 'flex';
    updateStats(); renderTimeline(); return;
  }
  empty.style.display = 'none';

  state.sequence.forEach((item, idx) => {
    const isLast = idx === state.sequence.length - 1;
    const prevMix = idx > 0 && state.sequence[idx-1].mix?.enabled;
    const thisMix = item.mix?.enabled && !isLast;
    const postureTotal = seqItemPostureTotal(item);
    const overflow = postureTotal - item.duration;
    const effDur = thisMix ? item.duration - item.mix.amount / 2 : item.duration;

    const wrapper = document.createElement('div');
    wrapper.className = 'song-wrapper';
    wrapper.dataset.seqId = item.id;

    const card = document.createElement('div');
    card.className = 'song-card' + (overflow > 0 ? ' overflow' : '');
    card.dataset.seqId = item.id;
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', e => onSongCardDragStart(e, item.id));
    card.addEventListener('dragend', onSongCardDragEnd);
    card.addEventListener('dragover', e => onSongCardDragOver(e, item.id));
    card.addEventListener('dragleave', e => onSongCardDragLeave(e));
    card.addEventListener('drop', e => onSongCardDrop(e, item.id));

    card.innerHTML = `
      <div class="song-header">
        <span class="song-handle">⠿</span>
        <div class="song-num">${idx+1}</div>
        <div class="song-info">
          <div class="song-title">${esc(item.title)}</div>
          <div class="song-artist">${esc(item.artist)}</div>
        </div>
        <div class="song-duration${thisMix?' mix-adjusted':''}" title="${thisMix?'Effective (mix-adjusted)':'Duration'}">
          ${fmtTime(effDur)}
        </div>
        <button class="btn icon sm" title="Remove" onclick="removeSeqItem('${item.id}')">✕</button>
      </div>
      <div class="song-controls">
        ${prevMix ? `<div class="mix-incoming">⇦ mix in</div>` : ''}
        ${!isLast ? `
          <div class="mix-toggle${thisMix?' active':''}" onclick="toggleMix('${item.id}')">⇄ Mix out</div>
          ${thisMix ? `
            <div class="mix-amount-wrap">
              overlap
              <input type="text" value="${fmtTime(item.mix.amount)}" placeholder="0:30"
                     onchange="updateMixAmount('${item.id}',this.value)" onclick="event.stopPropagation()">
              saves ${fmtTime(item.mix.amount/2)}
            </div>
          ` : ''}
        ` : ''}
      </div>
      <div class="song-postures-area" id="pa-${item.id}">
        ${item.postures.length === 0
          ? `<div class="posture-drop-zone" id="pdz-${item.id}">Drop postures here</div>`
          : buildPostureRows(item)
        }
      </div>
      ${overflow > 0 ? `
        <div class="overflow-warning">
          <div class="overflow-warning-icon">⚠️</div>
          <div class="overflow-warning-text">
            <strong>Postures overflow by ${fmtTime(overflow)}</strong><br>
            Total postures: ${fmtTime(postureTotal)} · Song: ${fmtTime(item.duration)}.
            Add another song or remove a posture.
          </div>
          <button class="btn success xs" onclick="openAddToSequenceModal()">+ Song</button>
        </div>
      ` : ''}
    `;
    wrapper.appendChild(card);

    // Mix connector
    if (thisMix) {
      const conn = document.createElement('div');
      conn.className = 'mix-connector visible';
      const pct = item.duration > 0 ? Math.min(100, (item.mix.amount/item.duration)*100) : 0;
      conn.innerHTML = `
        <div class="mix-connector-inner">
          <span>⇄ Mix: ${fmtTime(item.mix.amount)} overlap</span>
          <span style="color:var(--text2)">saves ${fmtTime(item.mix.amount/2)}</span>
        </div>
        <div class="mix-overlap-bar">
          <div class="mix-overlap-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>
      `;
      wrapper.appendChild(conn);
    }

    area.appendChild(wrapper);
    if (!isLast) {
      const gap = document.createElement('div');
      gap.className = 'song-gap' + (thisMix ? ' has-mix' : '');
      area.appendChild(gap);
    }
  });

  updateStats(); renderTimeline();
}

function buildPostureRows(seqItem) {
  return seqItem.postures.map(entry => {
    const p = getPosture(entry.postureId);
    if (!p) return '';
    return buildPostureRowHTML(seqItem.id, entry, p);
  }).join('');
}

function buildPostureRowHTML(seqId, entry, p) {
  const varBar = buildVariationBar(p);
  return `
    <div class="posture-row">
      <div class="posture-row-header">
        <div class="posture-color-swatch" style="background:${p.color}"></div>
        <div class="posture-row-name">${esc(p.name)}</div>
        <div class="posture-row-dur">${fmtTime(p.duration)}</div>
        <div class="posture-row-actions">
          <button class="btn icon xs" title="Edit posture" onclick="openPostureModal('${p.id}')">✏️</button>
          <button class="btn icon xs" title="Remove" onclick="removePostureFromSong('${seqId}','${entry.id}')">✕</button>
        </div>
      </div>
      ${varBar}
    </div>
  `;
}

function buildVariationBar(p) {
  if (!p.variations?.length) return '';
  const total = p.duration;
  const usedByVars = p.variations.reduce((s,v)=>s+v.duration,0);
  const free = Math.max(0, total - usedByVars);

  const segs = p.variations.map((v, idx) => {
    const flex = total > 0 ? (v.duration / total) * 100 : 0;
    if (flex === 0) return '';
    const color = varColor(p.color, idx);
    const label = v.name.length > 10 ? v.name.slice(0,9)+'…' : v.name;
    return `<div class="var-seg" style="flex:${flex.toFixed(2)};background:${color}" title="${esc(v.name)}: ${fmtTime(v.duration)}">
      <span class="var-seg-label">${flex>8?esc(label):''}</span>
    </div>`;
  }).join('');

  const freeFlex = total > 0 ? (free / total) * 100 : 0;
  const freeSeg = freeFlex > 0.5
    ? `<div class="var-seg free" style="flex:${freeFlex.toFixed(2)}" title="Unassigned: ${fmtTime(free)}">
        <span class="var-seg-label">${freeFlex>8?fmtTime(free):''}</span>
       </div>`
    : '';

  return `<div class="variation-bar">${segs}${freeSeg}</div>`;
}

function removePostureFromSong(seqId, entryId) {
  const item = getSeqItem(seqId);
  item.postures = item.postures.filter(e => e.id !== entryId);
  save(); renderSequence();
}

function removeSeqItem(id) {
  const idx = state.sequence.findIndex(s => s.id === id);
  state.sequence.splice(idx, 1);
  validateMixes();
  save(); renderSequence();
}

function clearSequence() {
  if (!state.sequence.length) return;
  if (!confirm('Clear all songs from the plan?')) return;
  state.sequence = [];
  save(); renderSequence();
}

// ── MIX ────────────────────────────────────────────────────────────
function toggleMix(seqId) {
  const item = getSeqItem(seqId);
  const idx = state.sequence.indexOf(item);
  if (idx >= state.sequence.length - 1) { toast("Can't mix the last song"); return; }
  item.mix.enabled = !item.mix.enabled;
  if (item.mix.enabled && !item.mix.amount) item.mix.amount = 30;
  save(); renderSequence();
}
function updateMixAmount(seqId, val) {
  const item = getSeqItem(seqId);
  const secs = parseTime(val);
  if (secs !== null && secs >= 0) { item.mix.amount = secs; save(); renderSequence(); }
}
function validateMixes() {
  const last = state.sequence[state.sequence.length-1];
  if (last?.mix?.enabled) last.mix.enabled = false;
}

// ── STATS ──────────────────────────────────────────────────────────
function updateStats() {
  const { total, effective } = calcEffectiveTime();
  document.getElementById('stat-songs').textContent = state.sequence.length;
  document.getElementById('stat-time').textContent = fmtTime(total);
  document.getElementById('stat-eff').textContent = fmtTime(effective);
}

// ── TIMELINE ───────────────────────────────────────────────────────
function renderTimeline() {
  const track = document.getElementById('timeline-track');
  const labels = document.getElementById('timeline-labels');
  const legend = document.getElementById('timeline-legend');
  const totalEl = document.getElementById('timeline-total');

  const { total, effective, mixSaved } = calcEffectiveTime();
  totalEl.textContent = total > 0
    ? `Total: ${fmtTime(total)}  ·  Effective: ${fmtTime(effective)}  ·  Mix saves: ${fmtTime(mixSaved)}`
    : '';

  if (!state.sequence.length || !total) {
    track.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px">Add songs to see timeline</div>';
    labels.innerHTML = ''; legend.innerHTML = ''; return;
  }

  let segs = '', labelData = [], acc = 0;
  state.sequence.forEach((item, idx) => {
    const isLast = idx === state.sequence.length - 1;
    const mixAdj = item.mix?.enabled && !isLast ? item.mix.amount/2 : 0;
    const disp = item.duration - mixAdj;
    const pct = (disp / effective) * 100;

    // Color: use first posture's color, else gray
    let bgColor = '#2e3348';
    if (item.postures.length > 0) {
      const p = getPosture(item.postures[0].postureId);
      if (p) bgColor = p.color + 'cc';
    }

    const lbl = item.title.length > 12 ? item.title.slice(0,11)+'…' : item.title;
    segs += `<div class="timeline-seg" style="flex:${pct.toFixed(3)};background:${bgColor}" title="${esc(item.title)} — ${fmtTime(disp)}">
      <span>${pct>5?lbl:''}</span>
      ${item.mix?.enabled && !isLast ? `<div class="timeline-mix-overlay" style="width:${Math.min(50,(item.mix.amount/item.duration)*100).toFixed(1)}%"></div>` : ''}
    </div>`;
    labelData.push({ pct: (acc/effective)*100, time: acc });
    acc += disp;
  });
  labelData.push({ pct: 100, time: acc });

  track.innerHTML = segs;
  labels.innerHTML = labelData.map(l =>
    `<div class="timeline-label" style="left:${l.pct.toFixed(1)}%">${fmtTime(l.time)}</div>`
  ).join('');

  // Legend: unique postures used
  const usedIds = new Set(state.sequence.flatMap(s => s.postures.map(e => e.postureId)));
  legend.innerHTML = usedIds.size > 0
    ? Array.from(usedIds).map(pid => {
        const p = getPosture(pid);
        return p ? `<div class="legend-item"><div class="legend-dot" style="background:${p.color}"></div>${esc(p.name)}</div>` : '';
      }).join('')
    : '<div style="font-size:11px;color:var(--text3)">Assign postures to songs to see legend</div>';
}

// ══════════════════════════════════════════════════════════════════
//  DRAG & DROP
// ══════════════════════════════════════════════════════════════════
let dragSrc = null;

// Posture from library → song card
function onPostureDragStart(e, postureId) {
  dragSrc = 'posture';
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'posture:' + postureId);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onPostureDragEnd(e) {
  e.target.classList.remove('dragging');
  dragSrc = null; clearDragStyles();
}

// Song from history → sequence area
function onSongHistDragStart(e, histId) {
  dragSrc = 'song-hist';
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'song:' + histId);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onSongHistDragEnd(e) {
  e.target.classList.remove('dragging');
  dragSrc = null; clearDragStyles();
}

// Song card reorder
let cardDragId = null;
function onSongCardDragStart(e, seqId) {
  dragSrc = 'song-card';
  cardDragId = seqId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'card:' + seqId);
}
function onSongCardDragEnd(e) {
  dragSrc = null; cardDragId = null; clearDragStyles();
}
function onSongCardDragOver(e, seqId) {
  e.preventDefault();
  const data = e.dataTransfer.getData('text/plain') || '';
  if (dragSrc === 'posture' || data.startsWith('posture:')) {
    e.dataTransfer.dropEffect = 'copy';
    e.currentTarget.classList.add('posture-drag-over');
    e.currentTarget.classList.remove('drag-over');
  } else if (dragSrc === 'song-card' && cardDragId !== seqId) {
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  } else if (dragSrc === 'song-hist') {
    e.dataTransfer.dropEffect = 'copy';
  }
}
function onSongCardDragLeave(e) {
  e.currentTarget.classList.remove('drag-over','posture-drag-over');
}
function onSongCardDrop(e, seqId) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('drag-over','posture-drag-over');
  const data = e.dataTransfer.getData('text/plain');
  if (data.startsWith('posture:')) {
    dropPostureOnSong(seqId, data.replace('posture:',''));
  } else if (data.startsWith('card:')) {
    const fromId = data.replace('card:','');
    if (fromId !== seqId) reorderSeq(fromId, seqId);
  }
}

function onSequenceAreaDragOver(e) {
  if (dragSrc === 'song-hist') { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
}
function onSequenceAreaDrop(e) {
  const data = e.dataTransfer.getData('text/plain');
  if (data.startsWith('song:')) {
    const s = getSongHist(data.replace('song:',''));
    if (s) addSeqItem(s.title, s.artist, s.duration, s.id);
  }
}

function dropPostureOnSong(seqId, postureId) {
  const item = getSeqItem(seqId);
  const posture = getPosture(postureId);
  if (!item || !posture) return;

  // Check overflow before adding
  const currentTotal = seqItemPostureTotal(item);
  if (currentTotal >= item.duration) {
    toast(`"${item.title}" is full (${fmtTime(currentTotal)} / ${fmtTime(item.duration)}). Add another song first.`);
    return;
  }

  item.postures.push({ id: uid(), postureId, notes: '' });
  save(); renderSequence();

  // Check overflow after adding and warn
  const newTotal = seqItemPostureTotal(item);
  if (newTotal > item.duration) {
    toast(`⚠️ Postures now exceed "${item.title}" by ${fmtTime(newTotal - item.duration)}`);
  } else {
    toast(`${posture.name} added to "${item.title}"`);
  }
}

function reorderSeq(fromId, toId) {
  const fi = state.sequence.findIndex(s => s.id === fromId);
  const ti = state.sequence.findIndex(s => s.id === toId);
  if (fi===-1||ti===-1) return;
  const [item] = state.sequence.splice(fi, 1);
  state.sequence.splice(ti, 0, item);
  validateMixes();
  save(); renderSequence();
}

function clearDragStyles() {
  document.querySelectorAll('.drag-over,.posture-drag-over').forEach(el =>
    el.classList.remove('drag-over','posture-drag-over')
  );
}

// ── KEYBOARD & MODAL CLOSE ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ── SEED DATA ──────────────────────────────────────────────────────

    const defaults = [
      { name: 'Warm-Up',       duration: 180, color: COLORS[1],
        variations: [{id:uid(),name:'Hold',duration:60},{id:uid(),name:'Pulse',duration:60},{id:uid(),name:'Large ROM',duration:60}] },
      { name: 'Seated Climb',  duration: 150, color: COLORS[0],
        variations: [{id:uid(),name:'Hold',duration:90},{id:uid(),name:'Pulse',duration:60}] },
      { name: 'Standing Climb',duration: 120, color: COLORS[4],
        variations: [{id:uid(),name:'Large ROM',duration:60},{id:uid(),name:'Hold',duration:60}] },
      { name: 'Threshold Push',duration: 240, color: COLORS[2],
        variations: [{id:uid(),name:'Pulse',duration:120},{id:uid(),name:'Hold',duration:120}] },
      { name: 'Sprint',        duration: 90,  color: COLORS[3],
        variations: [{id:uid(),name:'Pulse',duration:45},{id:uid(),name:'Large ROM',duration:45}] },
      { name: 'Recovery',      duration: 180, color: COLORS[5],
        variations: [{id:uid(),name:'Hold',duration:180}] },
      { name: 'Cool-Down',     duration: 230, color: COLORS[6],

    ];
    defaults.forEach(d => state.postures.push({ id: uid(), ...d }));
  }
  if (!state.songHistory.length) {
    [
      { title:'Higher Ground',  artist:'Solar Fields', duration:200 },
      { title:'Long Climb',     artist:'Echo Valley',  duration:310 },
      { title:'Push The Pace',  artist:'Riftline',     duration:245 },
      { title:'Steady Burn',    artist:'Nightcoast',   duration:225 },
      { title:'Sprint Theory',  artist:'Voltage Park', duration:160 },
      { title:'Even Keel',      artist:'Even Keel',    duration:270 },
      { title:'Wind Down',      artist:'Wind Down',    duration:230 },
    ].forEach(s => state.songHistory.push({ id: uid(), ...s }));
  }
  save();
}

// ── INIT ───────────────────────────────────────────────────────────
load();
seedDefaults();
renderPostures();
renderSongHistory();
renderSequence();
</script>
