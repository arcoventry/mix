<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song ↔ Exercise Sequence Planner</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d26;
    --bg3: #22263a;
    --border: #2e3348;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --text: #e4e6f0;
    --text2: #8a8fa8;
    --text3: #5a5f78;
    --success: #3dba7a;
    --warn: #f5a623;
    --danger: #e05252;
    --mix-color: #f5a623;
    --radius: 8px;
    --panel-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text);
    white-space: nowrap;
  }
  #topbar h1 span { color: var(--accent); }
  .topbar-stats {
    display: flex;
    gap: 24px;
    margin-left: auto;
    align-items: center;
  }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn.danger { background: var(--danger); }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn.icon { padding: 4px 8px; font-size: 14px; background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .btn.icon:hover { color: var(--text); border-color: var(--text3); }

  /* ── LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  #left-panel {
    width: var(--panel-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-tab {
    flex: 1;
    padding: 10px 8px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .panel-section { display: none; flex-direction: column; gap: 8px; }
  .panel-section.active { display: flex; }

  /* ── BLOCK / SONG CARDS IN LIBRARY ── */
  .lib-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: grab;
    user-select: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .lib-item:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .lib-item.dragging { opacity: .4; }
  .block-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .lib-item-info { flex: 1; min-width: 0; }
  .lib-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-item-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .lib-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ── CENTER AREA ── */
  #center {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sequence-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .sequence-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 12px;
    pointer-events: none;
  }
  .sequence-empty .big-icon { font-size: 48px; opacity: .3; }

  /* ── SONG CARD ── */
  .song-wrapper {
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .song-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    transition: border-color .15s, box-shadow .15s;
    position: relative;
    z-index: 1;
  }
  .song-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent)40; }
  .song-card.block-drag-over { border-color: var(--success); box-shadow: 0 0 0 2px var(--success)40; }

  .song-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: grab;
  }
  .song-handle { color: var(--text3); font-size: 16px; cursor: grab; }
  .song-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text2);
    flex-shrink: 0;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-artist { font-size: 11px; color: var(--text2); }
  .song-duration {
    font-size: 13px; font-weight: 700; color: var(--accent);
    background: var(--bg3);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .song-duration.effective { color: var(--mix-color); }

  .song-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px 8px;
    flex-wrap: wrap;
  }
  .mix-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    transition: all .15s;
    user-select: none;
  }
  .mix-toggle.active {
    background: #f5a62322;
    border-color: var(--mix-color);
    color: var(--mix-color);
  }
  .mix-toggle .mix-icon { font-size: 14px; }
  .mix-incoming {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--mix-color);
    background: #f5a62315;
    border: 1px solid #f5a62340;
    border-radius: 20px;
    padding: 3px 10px;
  }
  .mix-amount-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .mix-amount-wrap input {
    width: 68px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 3px 7px;
    text-align: center;
  }
  .mix-amount-wrap input:focus { outline: none; border-color: var(--mix-color); }

  /* ── EXERCISE BLOCKS ON SONG ── */
  .song-blocks-area {
    padding: 0 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 32px;
  }
  .song-blocks-drop {
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    transition: border-color .15s, background .15s;
  }
  .song-blocks-drop.has-blocks { border: none; padding: 0; }
  .song-blocks-drop.hover { border-color: var(--success); background: #3dba7a10; color: var(--success); }

  .block-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border-radius: 6px;
    padding: 5px 8px;
    position: relative;
  }
  .block-color-bar {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .block-row-info { flex: 1; min-width: 0; }
  .block-row-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block-row-time { font-size: 11px; color: var(--text2); }
  .block-row-actions { display: flex; gap: 3px; }
  .block-row input.inline-time {
    width: 64px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 11px;
    padding: 2px 6px;
    text-align: center;
  }
  .block-row input.inline-time:focus { outline: none; border-color: var(--accent); }

  /* ── CONNECTOR (MIX VISUAL) ── */
  .mix-connector {
    display: none;
    position: relative;
    margin: 0 12px;
    z-index: 2;
  }
  .mix-connector.visible { display: block; }
  .mix-connector-inner {
    background: linear-gradient(135deg, #f5a62333 0%, #f5a62355 100%);
    border-left: 2px solid var(--mix-color);
    border-right: 2px solid var(--mix-color);
    border-radius: 0 0 8px 8px;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--mix-color);
    font-weight: 600;
  }
  .mix-overlap-bar {
    position: relative;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin: 4px 0;
    overflow: hidden;
  }
  .mix-overlap-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: var(--mix-color);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── SONG GAP (spacing between songs) ── */
  .song-gap { height: 8px; }
  .song-gap.has-mix { height: 0; }

  /* ── ADD SONG BAR ── */
  #add-song-bar {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    background: var(--bg2);
    flex-shrink: 0;
  }

  /* ── TIMELINE ── */
  #timeline-panel {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    padding: 10px 16px 12px;
  }
  .timeline-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .timeline-track {
    height: 36px;
    background: var(--bg3);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    display: flex;
  }
  .timeline-seg {
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
    text-shadow: 0 1px 2px #0006;
    transition: flex .3s;
    cursor: default;
  }
  .timeline-seg:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 1px;
    background: #ffffff22;
  }
  .timeline-mix-overlay {
    position: absolute;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 3px,
      #ffffff22 3px,
      #ffffff22 6px
    );
    pointer-events: none;
  }
  .timeline-labels {
    display: flex;
    margin-top: 4px;
    font-size: 10px;
    color: var(--text3);
    position: relative;
    height: 14px;
  }
  .timeline-label {
    position: absolute;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .timeline-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000a;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 380px;
    max-width: calc(100vw - 40px);
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 20px 60px #000c;
  }
  .modal h2 { font-size: 16px; font-weight: 700; }
  .modal-body { display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .field input, .field select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 8px 12px;
    width: 100%;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* Color picker row */
  .color-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .color-opt {
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .1s, transform .1s;
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { border-color: #fff; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SONG SEARCH LIST ── */
  .song-search-results {
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    background: var(--bg3);
  }
  .song-search-result {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background .1s;
  }
  .song-search-result:last-child { border-bottom: none; }
  .song-search-result:hover { background: var(--bg2); }
  .song-search-result .ssr-title { font-weight: 600; }
  .song-search-result .ssr-sub { font-size: 11px; color: var(--text2); }
  .song-search-result .ssr-dur { font-size: 12px; color: var(--accent); margin-left: auto; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>Song <span>↔</span> Exercise Planner</h1>
  <div class="topbar-stats">
    <div class="stat">
      <span class="stat-label">Songs</span>
      <span class="stat-value" id="stat-songs">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Time</span>
      <span class="stat-value" id="stat-time">0:00</span>
    </div>
    <div class="stat">
      <span class="stat-label">Effective Time</span>
      <span class="stat-value" id="stat-eff">0:00</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="blocks">Exercise Blocks</div>
      <div class="panel-tab" data-tab="songs">Song History</div>
    </div>
    <div class="panel-body">
      <!-- BLOCKS SECTION -->
      <div class="panel-section active" id="section-blocks">
        <button class="btn sm" onclick="openBlockModal()">+ New Block</button>
        <div id="blocks-list"></div>
      </div>
      <!-- SONGS SECTION -->
      <div class="panel-section" id="section-songs">
        <button class="btn sm" onclick="openSongModal()">+ Add Song</button>
        <div id="songs-list"></div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="sequence-area" ondragover="onSequenceAreaDragOver(event)" ondrop="onSequenceAreaDrop(event)">
      <div class="sequence-empty" id="seq-empty">
        <div class="big-icon">🎵</div>
        <div>Drag songs from the history panel,<br>or click "+ Add Song to Plan" below.</div>
      </div>
    </div>

    <div id="add-song-bar">
      <button class="btn secondary" style="flex:1" onclick="openAddToSequenceModal()">+ Add Song to Plan</button>
      <button class="btn icon" title="Clear all" onclick="clearSequence()">🗑</button>
    </div>

    <!-- TIMELINE -->
    <div id="timeline-panel">
      <div class="timeline-header">
        Timeline
        <span id="timeline-total" style="font-weight:400;color:var(--text2);font-size:11px"></span>
      </div>
      <div class="timeline-track" id="timeline-track"></div>
      <div class="timeline-labels" id="timeline-labels"></div>
      <div class="timeline-legend" id="timeline-legend"></div>
    </div>
  </div>
</div>

<!-- ── MODALS ── -->

<!-- Block Modal -->
<div class="modal-overlay" id="block-modal">
  <div class="modal">
    <h2 id="block-modal-title">New Exercise Block</h2>
    <div class="modal-body">
      <div class="field">
        <label>Block Name</label>
        <input id="bm-name" type="text" placeholder="e.g. Seated Climb">
      </div>
      <div class="field">
        <label>Default Duration (mm:ss)</label>
        <input id="bm-dur" type="text" placeholder="e.g. 2:30">
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-options" id="bm-colors"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeBlockModal()">Cancel</button>
      <button class="btn" onclick="saveBlock()">Save Block</button>
    </div>
  </div>
</div>

<!-- Song Modal -->
<div class="modal-overlay" id="song-modal">
  <div class="modal">
    <h2 id="song-modal-title">Add Song to History</h2>
    <div class="modal-body">
      <div class="field">
        <label>Song Title</label>
        <input id="sm-title" type="text" placeholder="e.g. Higher Ground">
      </div>
      <div class="field">
        <label>Artist</label>
        <input id="sm-artist" type="text" placeholder="e.g. Solar Fields">
      </div>
      <div class="field">
        <label>Duration (mm:ss)</label>
        <input id="sm-dur" type="text" placeholder="e.g. 3:45">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeSongModal()">Cancel</button>
      <button class="btn" onclick="saveSong()">Save Song</button>
    </div>
  </div>
</div>

<!-- Add to Sequence Modal -->
<div class="modal-overlay" id="seq-modal">
  <div class="modal">
    <h2>Add Song to Plan</h2>
    <div class="modal-body">
      <div class="field">
        <label>Search history or enter new</label>
        <input id="seqm-search" type="text" placeholder="Type to search…" oninput="seqSearchFilter()">
      </div>
      <div class="song-search-results" id="seqm-results"></div>
      <div style="display:flex;align-items:center;gap:8px;color:var(--text3);font-size:12px">
        <div style="flex:1;height:1px;background:var(--border)"></div> or add new <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="field">
        <label>Song Title</label>
        <input id="seqm-title" type="text" placeholder="Title">
      </div>
      <div class="field">
        <label>Artist</label>
        <input id="seqm-artist" type="text" placeholder="Artist">
      </div>
      <div class="field">
        <label>Duration (mm:ss)</label>
        <input id="seqm-dur" type="text" placeholder="e.g. 3:45">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeSeqModal()">Cancel</button>
      <button class="btn" onclick="addSongToSequence()">Add to Plan</button>
    </div>
  </div>
</div>

<!-- Block-on-song edit modal -->
<div class="modal-overlay" id="blocsong-modal">
  <div class="modal">
    <h2>Edit Block Segment</h2>
    <div class="modal-body">
      <div class="field">
        <label>Block</label>
        <input id="bsm-block" type="text" readonly style="color:var(--text2)">
      </div>
      <div class="field">
        <label>Segment Duration (mm:ss) — leave blank for full block</label>
        <input id="bsm-dur" type="text" placeholder="e.g. 1:30">
      </div>
      <div class="field">
        <label>Notes</label>
        <input id="bsm-notes" type="text" placeholder="Optional notes">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" onclick="closeBlocSongModal()">Cancel</button>
      <button class="btn" onclick="saveBlocSong()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const COLORS = [
  '#4f8ef7','#3dba7a','#e05252','#f5a623','#9c59d1',
  '#26c6da','#ff7043','#66bb6a','#ab47bc','#ef5350',
  '#29b6f6','#ffca28','#8d6e63','#78909c','#ec407a'
];

// ── STATE ──────────────────────────────────────────────────
let state = {
  blocks: [],      // {id, name, duration (s), color}
  songHistory: [], // {id, title, artist, duration (s)}
  sequence: [],    // {id, songId, title, artist, duration(s), mix:{enabled,amount(s)}, blocks:[{id,blockId,segDur(s|null),notes}]}
};

let dragSrc = null;      // currently dragged lib-item type
let dragSrcData = null;  // data for dragged item
let blockModalEditId = null;
let songModalEditId = null;
let bsEditKey = null; // {seqId, blockEntryId}

// ── PERSISTENCE ───────────────────────────────────────────
function save() {
  localStorage.setItem('planner_state', JSON.stringify(state));
}
function load() {
  try {
    const d = localStorage.getItem('planner_state');
    if (d) state = JSON.parse(d);
  } catch(e) {}
  if (!state.blocks) state.blocks = [];
  if (!state.songHistory) state.songHistory = [];
  if (!state.sequence) state.sequence = [];
}

// ── HELPERS ───────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function parseTime(str) {
  if (!str) return null;
  str = String(str).trim();
  const parts = str.split(':');
  if (parts.length === 2) {
    const m = parseInt(parts[0], 10) || 0;
    const s = parseInt(parts[1], 10) || 0;
    return m * 60 + s;
  }
  const n = parseFloat(str);
  return isNaN(n) ? null : Math.round(n);
}
function fmtTime(secs) {
  if (secs == null || isNaN(secs)) return '--';
  secs = Math.round(secs);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function getBlock(id) { return state.blocks.find(b => b.id === id); }
function getSongHist(id) { return state.songHistory.find(s => s.id === id); }
function getSeqItem(id) { return state.sequence.find(s => s.id === id); }

// Total effective time calculation
function calcEffectiveTime() {
  let total = 0;
  let mixSaved = 0;
  state.sequence.forEach((item, i) => {
    total += item.duration || 0;
    if (item.mix && item.mix.enabled && item.mix.amount > 0 && i < state.sequence.length - 1) {
      mixSaved += (item.mix.amount / 2);
    }
  });
  return { total, effective: total - mixSaved, mixSaved };
}

// ── PANEL TABS ────────────────────────────────────────────
document.querySelectorAll('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('section-' + tab.dataset.tab).classList.add('active');
  });
});

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── BLOCK MODAL ───────────────────────────────────────────
let selectedColor = COLORS[0];
function openBlockModal(editId) {
  blockModalEditId = editId || null;
  const modal = document.getElementById('block-modal');
  document.getElementById('block-modal-title').textContent = editId ? 'Edit Exercise Block' : 'New Exercise Block';
  if (editId) {
    const b = getBlock(editId);
    document.getElementById('bm-name').value = b.name;
    document.getElementById('bm-dur').value = fmtTime(b.duration);
    selectedColor = b.color;
  } else {
    document.getElementById('bm-name').value = '';
    document.getElementById('bm-dur').value = '';
    selectedColor = COLORS[state.blocks.length % COLORS.length];
  }
  renderColorPicker();
  modal.classList.add('open');
  document.getElementById('bm-name').focus();
}
function closeBlockModal() {
  document.getElementById('block-modal').classList.remove('open');
}
function renderColorPicker() {
  const container = document.getElementById('bm-colors');
  container.innerHTML = COLORS.map(c => `
    <div class="color-opt ${c === selectedColor ? 'selected' : ''}"
         style="background:${c}" onclick="selectColor('${c}')"></div>
  `).join('');
}
function selectColor(c) {
  selectedColor = c;
  renderColorPicker();
}
function saveBlock() {
  const name = document.getElementById('bm-name').value.trim();
  const durStr = document.getElementById('bm-dur').value.trim();
  if (!name) { toast('Block name required'); return; }
  const dur = parseTime(durStr);
  if (dur === null) { toast('Enter a valid duration (m:ss)'); return; }
  if (blockModalEditId) {
    const b = getBlock(blockModalEditId);
    b.name = name; b.duration = dur; b.color = selectedColor;
  } else {
    state.blocks.push({ id: uid(), name, duration: dur, color: selectedColor });
  }
  save(); renderBlocks(); closeBlockModal(); toast('Block saved');
}
function deleteBlock(id) {
  if (!confirm('Delete this block?')) return;
  state.blocks = state.blocks.filter(b => b.id !== id);
  // Remove from all sequence items
  state.sequence.forEach(s => { s.blocks = s.blocks.filter(b => b.blockId !== id); });
  save(); renderBlocks(); renderSequence();
}

// ── SONG HISTORY MODAL ────────────────────────────────────
function openSongModal(editId) {
  songModalEditId = editId || null;
  document.getElementById('song-modal-title').textContent = editId ? 'Edit Song' : 'Add Song to History';
  if (editId) {
    const s = getSongHist(editId);
    document.getElementById('sm-title').value = s.title;
    document.getElementById('sm-artist').value = s.artist;
    document.getElementById('sm-dur').value = fmtTime(s.duration);
  } else {
    document.getElementById('sm-title').value = '';
    document.getElementById('sm-artist').value = '';
    document.getElementById('sm-dur').value = '';
  }
  document.getElementById('song-modal').classList.add('open');
  document.getElementById('sm-title').focus();
}
function closeSongModal() {
  document.getElementById('song-modal').classList.remove('open');
}
function saveSong() {
  const title = document.getElementById('sm-title').value.trim();
  const artist = document.getElementById('sm-artist').value.trim();
  const dur = parseTime(document.getElementById('sm-dur').value);
  if (!title) { toast('Song title required'); return; }
  if (dur === null) { toast('Enter a valid duration (m:ss)'); return; }
  if (songModalEditId) {
    const s = getSongHist(songModalEditId);
    s.title = title; s.artist = artist; s.duration = dur;
  } else {
    state.songHistory.push({ id: uid(), title, artist, duration: dur });
  }
  save(); renderSongHistory(); closeSongModal(); toast('Song saved');
}
function deleteSongHist(id) {
  if (!confirm('Remove from history?')) return;
  state.songHistory = state.songHistory.filter(s => s.id !== id);
  save(); renderSongHistory();
}

// ── ADD TO SEQUENCE MODAL ─────────────────────────────────
function openAddToSequenceModal() {
  document.getElementById('seqm-search').value = '';
  document.getElementById('seqm-title').value = '';
  document.getElementById('seqm-artist').value = '';
  document.getElementById('seqm-dur').value = '';
  document.getElementById('seq-modal').classList.add('open');
  seqSearchFilter();
  document.getElementById('seqm-search').focus();
}
function closeSeqModal() {
  document.getElementById('seq-modal').classList.remove('open');
}
function seqSearchFilter() {
  const q = document.getElementById('seqm-search').value.toLowerCase();
  const results = document.getElementById('seqm-results');
  const hits = state.songHistory.filter(s =>
    s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
  );
  if (hits.length === 0) {
    results.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text3);font-size:12px">No matching songs</div>';
    return;
  }
  results.innerHTML = hits.map(s => `
    <div class="song-search-result" onclick="pickHistorySong('${s.id}')">
      <div>
        <div class="ssr-title">${esc(s.title)}</div>
        <div class="ssr-sub">${esc(s.artist)}</div>
      </div>
      <div class="ssr-dur">${fmtTime(s.duration)}</div>
    </div>
  `).join('');
}
function pickHistorySong(histId) {
  const s = getSongHist(histId);
  addSeqItemFromData(s.title, s.artist, s.duration, histId);
  closeSeqModal();
}
function addSongToSequence() {
  const title = document.getElementById('seqm-title').value.trim();
  const artist = document.getElementById('seqm-artist').value.trim();
  const dur = parseTime(document.getElementById('seqm-dur').value);
  if (!title) { toast('Song title required'); return; }
  if (dur === null) { toast('Enter a valid duration (m:ss)'); return; }
  // Also save to history if not already there
  let histId = null;
  const existing = state.songHistory.find(s => s.title.toLowerCase() === title.toLowerCase() && s.artist.toLowerCase() === artist.toLowerCase());
  if (existing) {
    histId = existing.id;
  } else {
    const newSong = { id: uid(), title, artist, duration: dur };
    state.songHistory.push(newSong);
    histId = newSong.id;
  }
  addSeqItemFromData(title, artist, dur, histId);
  save(); renderSongHistory(); closeSeqModal();
}
function addSeqItemFromData(title, artist, duration, songId) {
  state.sequence.push({
    id: uid(), songId, title, artist, duration,
    mix: { enabled: false, amount: 0 },
    blocks: []
  });
  save(); renderSequence(); toast(`"${title}" added to plan`);
}

// ── BLOCK-ON-SONG EDIT ────────────────────────────────────
function openBlocSongModal(seqId, blockEntryId) {
  bsEditKey = { seqId, blockEntryId };
  const seqItem = getSeqItem(seqId);
  const entry = seqItem.blocks.find(b => b.id === blockEntryId);
  const block = getBlock(entry.blockId);
  document.getElementById('bsm-block').value = block.name;
  document.getElementById('bsm-dur').value = entry.segDur != null ? fmtTime(entry.segDur) : '';
  document.getElementById('bsm-notes').value = entry.notes || '';
  document.getElementById('blocsong-modal').classList.add('open');
}
function closeBlocSongModal() {
  document.getElementById('blocsong-modal').classList.remove('open');
}
function saveBlocSong() {
  const { seqId, blockEntryId } = bsEditKey;
  const seqItem = getSeqItem(seqId);
  const entry = seqItem.blocks.find(b => b.id === blockEntryId);
  const durStr = document.getElementById('bsm-dur').value.trim();
  entry.segDur = durStr ? parseTime(durStr) : null;
  entry.notes = document.getElementById('bsm-notes').value.trim();
  save(); renderSequence(); closeBlocSongModal(); toast('Segment updated');
}

// ── RENDER BLOCKS LIBRARY ─────────────────────────────────
function renderBlocks() {
  const list = document.getElementById('blocks-list');
  if (state.blocks.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No blocks yet</div>';
    return;
  }
  list.innerHTML = state.blocks.map(b => `
    <div class="lib-item" draggable="true"
         ondragstart="onBlockDragStart(event,'${b.id}')"
         ondragend="onBlockDragEnd(event)">
      <div class="block-dot" style="background:${b.color}"></div>
      <div class="lib-item-info">
        <div class="lib-item-name">${esc(b.name)}</div>
        <div class="lib-item-sub">${fmtTime(b.duration)}</div>
      </div>
      <div class="lib-item-actions">
        <button class="btn icon sm" title="Edit" onclick="openBlockModal('${b.id}')">✏️</button>
        <button class="btn icon sm" title="Delete" onclick="deleteBlock('${b.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// ── RENDER SONG HISTORY ───────────────────────────────────
function renderSongHistory() {
  const list = document.getElementById('songs-list');
  if (state.songHistory.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">No songs yet</div>';
    return;
  }
  list.innerHTML = state.songHistory.map(s => `
    <div class="lib-item" draggable="true"
         ondragstart="onSongDragStart(event,'${s.id}')"
         ondragend="onSongDragEnd(event)">
      <div style="font-size:16px">🎵</div>
      <div class="lib-item-info">
        <div class="lib-item-name">${esc(s.title)}</div>
        <div class="lib-item-sub">${esc(s.artist)} · ${fmtTime(s.duration)}</div>
      </div>
      <div class="lib-item-actions">
        <button class="btn icon sm" title="Edit" onclick="openSongModal('${s.id}')">✏️</button>
        <button class="btn icon sm" title="Delete" onclick="deleteSongHist('${s.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// ── RENDER SEQUENCE ───────────────────────────────────────
function renderSequence() {
  const area = document.getElementById('sequence-area');
  const empty = document.getElementById('seq-empty');

  if (state.sequence.length === 0) {
    // Clear all song cards but keep empty state
    Array.from(area.children).forEach(c => { if (c !== empty) c.remove(); });
    empty.style.display = 'flex';
    updateStats(); renderTimeline();
    return;
  }
  empty.style.display = 'none';

  // Rebuild DOM
  // Remove old wrappers
  Array.from(area.querySelectorAll('.song-wrapper, .song-gap')).forEach(e => e.remove());

  state.sequence.forEach((item, idx) => {
    const isLast = idx === state.sequence.length - 1;
    const prevHasMix = idx > 0 && state.sequence[idx-1].mix && state.sequence[idx-1].mix.enabled;
    const thisMix = item.mix && item.mix.enabled;

    const wrapper = document.createElement('div');
    wrapper.className = 'song-wrapper';
    wrapper.dataset.seqId = item.id;

    // ── Song card ──
    const card = document.createElement('div');
    card.className = 'song-card';
    card.dataset.seqId = item.id;
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', e => onSongCardDragStart(e, item.id));
    card.addEventListener('dragend', onSongCardDragEnd);
    card.addEventListener('dragover', e => onSongCardDragOver(e, item.id));
    card.addEventListener('dragleave', e => onSongCardDragLeave(e));
    card.addEventListener('drop', e => onSongCardDrop(e, item.id));

    // Effective duration (accounts for outgoing mix)
    const effDur = thisMix && !isLast ? item.duration - (item.mix.amount / 2) : item.duration;

    card.innerHTML = `
      <div class="song-header">
        <span class="song-handle">⠿</span>
        <div class="song-num">${idx + 1}</div>
        <div class="song-info">
          <div class="song-title">${esc(item.title)}</div>
          <div class="song-artist">${esc(item.artist)}</div>
        </div>
        <div class="song-duration${thisMix && !isLast ? ' effective' : ''}" title="${thisMix && !isLast ? 'Effective (mix-adjusted)' : 'Duration'}">
          ${fmtTime(effDur)}
        </div>
        <button class="btn icon sm" title="Remove from plan" onclick="removeSeqItem('${item.id}')">✕</button>
      </div>
      <div class="song-controls">
        ${prevHasMix ? `<div class="mix-incoming">⇦ mix in</div>` : ''}
        ${!isLast ? `
          <div class="mix-toggle ${thisMix ? 'active' : ''}" onclick="toggleMix('${item.id}')">
            <span class="mix-icon">⇄</span> Mix out
          </div>
          ${thisMix ? `
            <div class="mix-amount-wrap">
              overlap
              <input type="text" value="${fmtTime(item.mix.amount)}"
                     placeholder="0:30"
                     onchange="updateMixAmount('${item.id}', this.value)"
                     onclick="event.stopPropagation()">
              saves ${fmtTime(item.mix.amount / 2)}
            </div>
          ` : ''}
        ` : ''}
      </div>
      <div class="song-blocks-area">
        <div class="song-blocks-drop ${item.blocks.length > 0 ? 'has-blocks' : ''}"
             id="drop-${item.id}">
          ${item.blocks.length === 0 ? 'Drop exercise blocks here' : renderBlockRows(item)}
        </div>
      </div>
    `;
    wrapper.appendChild(card);

    // ── Mix connector ──
    if (thisMix && !isLast) {
      const nextItem = state.sequence[idx + 1];
      const connector = document.createElement('div');
      connector.className = 'mix-connector visible';
      const pct = Math.min(100, item.duration > 0 ? (item.mix.amount / item.duration) * 100 : 0);
      connector.innerHTML = `
        <div class="mix-connector-inner">
          <span>⇄ Mix: ${fmtTime(item.mix.amount)} overlap</span>
          <span style="color:var(--text2)">saves ${fmtTime(item.mix.amount / 2)}</span>
        </div>
        <div class="mix-overlap-bar">
          <div class="mix-overlap-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>
      `;
      wrapper.appendChild(connector);
    }

    area.appendChild(wrapper);

    // Gap between songs
    if (!isLast) {
      const gap = document.createElement('div');
      gap.className = `song-gap${thisMix ? ' has-mix' : ''}`;
      area.appendChild(gap);
    }
  });

  updateStats();
  renderTimeline();
}

function renderBlockRows(seqItem) {
  return seqItem.blocks.map(entry => {
    const block = getBlock(entry.blockId);
    if (!block) return '';
    const displayDur = entry.segDur != null ? entry.segDur : block.duration;
    return `
      <div class="block-row">
        <div class="block-color-bar" style="background:${block.color}"></div>
        <div class="block-row-info">
          <div class="block-row-name">${esc(block.name)}</div>
          <div class="block-row-time">${fmtTime(displayDur)}${entry.segDur != null ? ' (custom)' : ''}${entry.notes ? ' · ' + esc(entry.notes) : ''}</div>
        </div>
        <div class="block-row-actions">
          <button class="btn icon sm" onclick="openBlocSongModal('${seqItem.id}','${entry.id}')">✏️</button>
          <button class="btn icon sm" onclick="removeBlockFromSong('${seqItem.id}','${entry.id}')">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

function removeBlockFromSong(seqId, blockEntryId) {
  const item = getSeqItem(seqId);
  item.blocks = item.blocks.filter(b => b.id !== blockEntryId);
  save(); renderSequence();
}

function removeSeqItem(id) {
  const idx = state.sequence.findIndex(s => s.id === id);
  // If this song was "mix-incoming" target, clean up previous song's mix
  if (idx > 0 && state.sequence[idx-1].mix && state.sequence[idx-1].mix.enabled) {
    // The previous song was mixing into this one — warn or auto-disable
  }
  state.sequence.splice(idx, 1);
  // Validate mix pairs
  validateMixes();
  save(); renderSequence();
}

function clearSequence() {
  if (state.sequence.length === 0) return;
  if (!confirm('Clear all songs from the plan?')) return;
  state.sequence = [];
  save(); renderSequence();
}

// ── MIX ───────────────────────────────────────────────────
function toggleMix(seqId) {
  const item = getSeqItem(seqId);
  const idx = state.sequence.indexOf(item);
  if (idx >= state.sequence.length - 1) { toast("Can't mix the last song"); return; }
  item.mix.enabled = !item.mix.enabled;
  if (item.mix.enabled && item.mix.amount === 0) item.mix.amount = 30; // default 0:30
  save(); renderSequence();
}
function updateMixAmount(seqId, val) {
  const item = getSeqItem(seqId);
  const secs = parseTime(val);
  if (secs !== null && secs >= 0) {
    item.mix.amount = secs;
    save(); renderSequence();
  }
}
function validateMixes() {
  // If last song had mix, disable it (no next song)
  const last = state.sequence[state.sequence.length - 1];
  if (last && last.mix && last.mix.enabled) last.mix.enabled = false;
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  const { total, effective } = calcEffectiveTime();
  document.getElementById('stat-songs').textContent = state.sequence.length;
  document.getElementById('stat-time').textContent = fmtTime(total);
  document.getElementById('stat-eff').textContent = fmtTime(effective);
}

// ── TIMELINE ──────────────────────────────────────────────
function renderTimeline() {
  const track = document.getElementById('timeline-track');
  const labels = document.getElementById('timeline-labels');
  const legend = document.getElementById('timeline-legend');
  const totalEl = document.getElementById('timeline-total');

  const { total, effective, mixSaved } = calcEffectiveTime();
  totalEl.textContent = total > 0
    ? `Total: ${fmtTime(total)}  ·  Effective: ${fmtTime(effective)}  ·  Mix saves: ${fmtTime(mixSaved)}`
    : '';

  if (state.sequence.length === 0 || total === 0) {
    track.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px">Add songs to see timeline</div>';
    labels.innerHTML = '';
    legend.innerHTML = '';
    return;
  }

  // Build segments
  let segs = '';
  let labelData = [];
  let accTime = 0;

  state.sequence.forEach((item, idx) => {
    const isLast = idx === state.sequence.length - 1;
    const mixAdj = (item.mix && item.mix.enabled && !isLast) ? item.mix.amount / 2 : 0;
    const dispDur = item.duration - mixAdj;
    const pct = (dispDur / effective) * 100;

    // Dominant block color for this song
    let bgColor = '#2e3348';
    if (item.blocks.length > 0) {
      const block = getBlock(item.blocks[0].blockId);
      if (block) bgColor = block.color + 'bb';
    }

    const label = item.title.length > 12 ? item.title.slice(0, 11) + '…' : item.title;
    segs += `<div class="timeline-seg" style="flex:${pct.toFixed(3)};background:${bgColor}" title="${esc(item.title)} - ${fmtTime(dispDur)}">
      <span>${pct > 5 ? label : ''}</span>
      ${item.mix && item.mix.enabled && !isLast ? `<div class="timeline-mix-overlay" style="right:0;width:${Math.min(50, (item.mix.amount/item.duration)*100).toFixed(1)}%"></div>` : ''}
    </div>`;

    // Label position
    labelData.push({ pct: (accTime / effective) * 100, time: accTime });
    accTime += dispDur;
  });
  // Final label
  labelData.push({ pct: 100, time: accTime });

  track.innerHTML = segs;
  labels.innerHTML = labelData.map(l =>
    `<div class="timeline-label" style="left:${l.pct.toFixed(1)}%">${fmtTime(l.time)}</div>`
  ).join('');

  // Legend: unique blocks used
  const usedBlockIds = new Set();
  state.sequence.forEach(s => s.blocks.forEach(b => usedBlockIds.add(b.blockId)));
  const legendItems = Array.from(usedBlockIds).map(bid => {
    const block = getBlock(bid);
    if (!block) return '';
    return `<div class="legend-item"><div class="legend-dot" style="background:${block.color}"></div>${esc(block.name)}</div>`;
  }).join('');
  legend.innerHTML = legendItems || '<div style="font-size:11px;color:var(--text3)">Assign exercise blocks to songs to see legend</div>';
}

// ── DRAG: BLOCK FROM LIBRARY ──────────────────────────────
function onBlockDragStart(e, blockId) {
  dragSrc = 'block';
  dragSrcData = blockId;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'block:' + blockId);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onBlockDragEnd(e) {
  e.target.classList.remove('dragging');
  dragSrc = null; dragSrcData = null;
  clearDragOverStyles();
}

// ── DRAG: SONG FROM HISTORY ───────────────────────────────
let songDragHistId = null;
function onSongDragStart(e, histId) {
  dragSrc = 'song-hist';
  songDragHistId = histId;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'song:' + histId);
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onSongDragEnd(e) {
  e.target.classList.remove('dragging');
  dragSrc = null; songDragHistId = null;
  clearDragOverStyles();
}

// ── DRAG: SONG CARD REORDER ───────────────────────────────
let cardDragId = null;
let cardDragOverId = null;
function onSongCardDragStart(e, seqId) {
  dragSrc = 'song-card';
  cardDragId = seqId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'card:' + seqId);
}
function onSongCardDragEnd(e) {
  dragSrc = null; cardDragId = null;
  clearDragOverStyles();
}
function onSongCardDragOver(e, seqId) {
  e.preventDefault();
  const data = e.dataTransfer.getData('text/plain') || '';
  if (dragSrc === 'block' || data.startsWith('block:')) {
    // Dropping block onto song
    e.dataTransfer.dropEffect = 'copy';
    const card = e.currentTarget;
    card.classList.add('block-drag-over');
    card.classList.remove('drag-over');
  } else if (dragSrc === 'song-card' && cardDragId !== seqId) {
    e.dataTransfer.dropEffect = 'move';
    const card = e.currentTarget;
    card.classList.add('drag-over');
    cardDragOverId = seqId;
  } else if (dragSrc === 'song-hist') {
    e.dataTransfer.dropEffect = 'copy';
  }
}
function onSongCardDragLeave(e) {
  e.currentTarget.classList.remove('drag-over', 'block-drag-over');
}
function onSongCardDrop(e, seqId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over', 'block-drag-over');

  const data = e.dataTransfer.getData('text/plain');
  if (data.startsWith('block:')) {
    const blockId = data.replace('block:', '');
    dropBlockOnSong(seqId, blockId);
  } else if (data.startsWith('card:')) {
    const fromId = data.replace('card:', '');
    if (fromId !== seqId) reorderSeq(fromId, seqId);
  }
}

// Allow drops on empty sequence area (for song-hist drops)
function onSequenceAreaDragOver(e) {
  if (dragSrc === 'song-hist') {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  }
}
function onSequenceAreaDrop(e) {
  const data = e.dataTransfer.getData('text/plain');
  if (data.startsWith('song:')) {
    const histId = data.replace('song:', '');
    const s = getSongHist(histId);
    if (s) addSeqItemFromData(s.title, s.artist, s.duration, histId);
  }
}

function dropBlockOnSong(seqId, blockId) {
  const seqItem = getSeqItem(seqId);
  const block = getBlock(blockId);
  if (!seqItem || !block) return;
  seqItem.blocks.push({ id: uid(), blockId, segDur: null, notes: '' });
  save(); renderSequence(); toast(`${block.name} added to "${seqItem.title}"`);
}

function reorderSeq(fromId, toId) {
  const fromIdx = state.sequence.findIndex(s => s.id === fromId);
  const toIdx = state.sequence.findIndex(s => s.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [item] = state.sequence.splice(fromIdx, 1);
  state.sequence.splice(toIdx, 0, item);
  validateMixes();
  save(); renderSequence();
}

function clearDragOverStyles() {
  document.querySelectorAll('.drag-over, .block-drag-over').forEach(el => {
    el.classList.remove('drag-over', 'block-drag-over');
  });
}

// ── ESCAPE HTML ───────────────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── SEED DATA ─────────────────────────────────────────────
function seedDefaults() {
  if (state.blocks.length === 0) {
    const defaults = [
      { name: 'Warm-Up Spin', duration: 180, color: COLORS[1] },
      { name: 'Seated Climb', duration: 150, color: COLORS[0] },
      { name: 'Standing Climb', duration: 120, color: COLORS[4] },
      { name: 'Threshold Push', duration: 240, color: COLORS[2] },
      { name: 'Sprint Intervals', duration: 90, color: COLORS[3] },
      { name: 'Recovery Spin', duration: 180, color: COLORS[5] },
      { name: 'Cool-Down Stretch', duration: 230, color: COLORS[6] },
    ];
    defaults.forEach(d => state.blocks.push({ id: uid(), ...d }));
  }
  if (state.songHistory.length === 0) {
    const songs = [
      { title: 'Higher Ground', artist: 'Solar Fields', duration: 200 },
      { title: 'Long Climb', artist: 'Echo Valley', duration: 310 },
      { title: 'Push The Pace', artist: 'Riftline', duration: 245 },
      { title: 'Steady Burn', artist: 'Nightcoast', duration: 225 },
      { title: 'Sprint Theory', artist: 'Voltage Park', duration: 160 },
      { title: 'Even Keel', artist: 'Even Keel', duration: 270 },
      { title: 'Wind Down', artist: 'Wind Down', duration: 230 },
    ];
    songs.forEach(s => state.songHistory.push({ id: uid(), ...s }));
  }
  save();
}

// ── INIT ──────────────────────────────────────────────────
load();
seedDefaults();
renderBlocks();
renderSongHistory();
renderSequence();
</script>
</body>
</html>
